<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── Supabase ──────────────────────────────────────────────────────────
const SUPA_URL = "https://dbwzhumltumeybupxrej.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRid3podW1sdHVtZXlidXB4cmVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4OTQxNTUsImV4cCI6MjA5NjQ3MDE1NX0.aEAYnGmrvL4QRWHlaXvHcjlaPCQQg9C5-D-FgwX7g1c";
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── localStorage（ハンドルといいね履歴のみ）────────────────────────────
const LS_LIKES  = "rb_likes";
const LS_HANDLE = "rb_handle";
function lsGet(k,d){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── Supabase API helpers ──────────────────────────────────────────────
async function fetchPosts(){
  const {data, error} = await sb
    .from("posts")
    .select("*, replies(*)")
    .order("created_at", {ascending:false})
    .limit(100);
  if(error) throw error;
  return (data||[]).map(p=>({
    ...p,
    ts: new Date(p.created_at).getTime(),
    imageUrl: p.image_url,
    replies: (p.replies||[]).map(r=>({...r, ts:new Date(r.created_at).getTime()}))
      .sort((a,b)=>a.ts-b.ts),
  }));
}

async function insertPost(post){
  const {data, error} = await sb.from("posts").insert({
    id:       post.id,
    handle:   post.handle,
    avatar:   post.avatar,
    text:     post.text,
    category: post.category,
    amount:   post.amount,
    shop:     post.shop,
    image_url:post.imageUrl,
    likes:    0,
  }).select().single();
  if(error) throw error;
  return {...data, ts:new Date(data.created_at).getTime(), imageUrl:data.image_url, replies:[]};
}

async function insertReply(reply, postId){
  const {data, error} = await sb.from("replies").insert({
    id:      reply.id,
    post_id: postId,
    handle:  reply.handle,
    avatar:  reply.avatar,
    text:    reply.text,
  }).select().single();
  if(error) throw error;
  return {...data, ts:new Date(data.created_at).getTime()};
}

async function updateLikes(postId, likes){
  await sb.from("posts").update({likes}).eq("id", postId);
}

// ── constants ─────────────────────────────────────────────────────────
const CATEGORIES = ["すべて","カフェ","飲食","電化製品","食料品","交通","ファッション","美容","その他"];
const CAT_COLOR  = {カフェ:"#c8860a",飲食:"#b85c38",電化製品:"#3a6ea8",食料品:"#4a8a4a",交通:"#6a5acd",ファッション:"#b06090",美容:"#d4736a",その他:"#888"};
const AVATARS    = ["😊","☕","🍜","💻","🛒","🚃","🎮","📚","🎵","🏃","🌿","🍕","✈️","🐱","🐶","🌸","🍖","💰","🏠","🗼","🥩","👜","🍣","🎯"];

function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)  return `${s}秒前`;
  if(s<3600)return `${Math.floor(s/60)}分前`;
  if(s<86400)return `${Math.floor(s/3600)}時間前`;
  return `${Math.floor(s/86400)}日前`;
}
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

// ── Spinner ───────────────────────────────────────────────────────────
function Spinner(){
  return <div style={{width:20,height:20,border:"3px solid #e0d8cc",borderTop:"3px solid #e8a000",borderRadius:"50%",animation:"spin 0.7s linear infinite",display:"inline-block"}}/>;
}

// ── HandleSetup ───────────────────────────────────────────────────────
const lbSt={fontSize:11,fontWeight:700,color:"#888",display:"block",marginBottom:4};
const inSt={width:"100%",padding:"10px 12px",border:"2px solid #e0d8cc",borderRadius:8,fontSize:14,marginBottom:14,fontFamily:"inherit",background:"#faf8f4",outline:"none"};

function HandleSetup({onDone}){
  const [name,setName]=useState("");
  const [avatar,setAvatar]=useState("😊");
  const err=name.trim().length===0;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(30,20,10,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{background:"#fffdf7",border:"3px solid #1a1209",borderRadius:16,padding:32,width:"100%",maxWidth:380,boxShadow:"6px 6px 0 #1a1209"}}>
        <div style={{fontFamily:"'Kaisei Decol',serif",fontSize:22,fontWeight:700,marginBottom:4}}>ハンドルネームを設定</div>
        <p style={{fontSize:13,color:"#888",marginBottom:20}}>投稿・返信に使う名前です。あとから変更できます。</p>
        <label style={lbSt}>表示名</label>
        <input style={inSt} placeholder="例：珈琲中毒" value={name} onChange={e=>setName(e.target.value)} maxLength={20}/>
        <label style={lbSt}>アバター</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
          {AVATARS.map(a=>(
            <button key={a} onClick={()=>setAvatar(a)}
              style={{fontSize:22,width:42,height:42,border:avatar===a?"3px solid #e8a000":"2px solid #ddd",borderRadius:10,background:avatar===a?"#fffbef":"#faf8f4",cursor:"pointer"}}>
              {a}
            </button>
          ))}
        </div>
        <button
          style={{width:"100%",padding:"12px",background:err?"#ccc":"#1a1209",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:15,cursor:err?"not-allowed":"pointer"}}
          onClick={()=>{if(!err){lsSet(LS_HANDLE,{name:name.trim(),avatar});onDone({name:name.trim(),avatar});}}}>
          はじめる
        </button>
      </div>
    </div>
  );
}

// ── PostComposer ──────────────────────────────────────────────────────
function PostComposer({handle, onPost}){
  const [open,    setOpen]    = useState(false);
  const [text,    setText]    = useState("");
  const [amount,  setAmount]  = useState("");
  const [shop,    setShop]    = useState("");
  const [cat,     setCat]     = useState("カフェ");
  const [imgUrl,  setImgUrl]  = useState(null);
  const [imgPrev, setImgPrev] = useState(null);
  const [scanning,setScanning]= useState(false);
  const [ocrDone, setOcrDone] = useState(false);
  const [posting, setPosting] = useState(false);
  const [postErr, setPostErr] = useState(null);
  const fileRef = useRef();

  const handleImg = async(file)=>{
    if(!file) return;
    setImgPrev(URL.createObjectURL(file));
    const dataUrl = await fileToBase64(file);
    setImgUrl(dataUrl);
    setScanning(true); setOcrDone(false);
    try{
      const b64=dataUrl.split(",")[1];
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:500,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},
            {type:"text",text:'この領収書・レシートを読み取り、JSONのみで返してください（前置き・コードブロック不要）: {"shop":"店舗名","amount":合計金額の数値,"category":"カフェ/飲食/電化製品/食料品/交通/ファッション/美容/その他のいずれか","memo":"一言で内容を要約（日本語20字以内）"} 読み取れない項目はnullにしてください。'}
          ]}]
        })
      });
      const data=await res.json();
      const txt=(data.content?.find(b=>b.type==="text")?.text||"{}").replace(/```json|```/g,"").trim();
      const ocr=JSON.parse(txt);
      if(ocr.shop)     setShop(ocr.shop);
      if(ocr.amount)   setAmount(String(ocr.amount));
      if(ocr.category) setCat(ocr.category);
      if(ocr.memo&&!text) setText(ocr.memo);
      setOcrDone(true);
    }catch(e){/* OCR失敗は無視 */}
    finally{setScanning(false);}
  };

  const submit = async()=>{
    if(!text.trim()) return;
    setPosting(true); setPostErr(null);
    try{
      const post = await insertPost({
        id:"p"+Date.now(),
        handle:handle.name, avatar:handle.avatar,
        text:text.trim(), category:cat,
        amount:amount?Number(amount):null,
        shop:shop.trim()||null,
        imageUrl:imgUrl,
      });
      onPost(post);
      setText(""); setAmount(""); setShop(""); setCat("カフェ");
      setImgUrl(null); setImgPrev(null); setOcrDone(false);
      setOpen(false);
    }catch(e){
      setPostErr("投稿に失敗しました。もう一度お試しください。");
    }finally{
      setPosting(false);
    }
  };

  if(!open) return(
    <div style={{background:"#fffdf7",border:"2px solid #e0d8cc",borderRadius:14,padding:"14px 18px",
      marginBottom:20,display:"flex",gap:12,alignItems:"center",cursor:"text",boxShadow:"2px 2px 0 #e0d8cc"}}
      onClick={()=>setOpen(true)}>
      <span style={{fontSize:28}}>{handle.avatar}</span>
      <span style={{color:"#bbb",fontSize:14,flex:1}}>今日の支出、シェアしませんか？</span>
      <span style={{background:"#e8a000",color:"#fff",padding:"6px 14px",borderRadius:8,fontWeight:700,fontSize:13}}>投稿する</span>
    </div>
  );

  return(
    <div style={{background:"#fffdf7",border:"2px solid #1a1209",borderRadius:14,padding:20,marginBottom:20,boxShadow:"3px 3px 0 #1a1209",animation:"fadeIn 0.2s ease"}}>
      <div style={{display:"flex",gap:12,marginBottom:12}}>
        <span style={{fontSize:28,flexShrink:0}}>{handle.avatar}</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:6,color:"#555"}}>{handle.name}</div>
          <textarea
            style={{width:"100%",minHeight:80,padding:"10px 12px",border:"2px solid #e0d8cc",borderRadius:8,
              fontSize:14,fontFamily:"inherit",resize:"vertical",background:"#faf8f4",outline:"none",lineHeight:1.6}}
            placeholder="支出の話、愚痴、お得情報なんでも"
            value={text} onChange={e=>setText(e.target.value)} autoFocus maxLength={500}/>
        </div>
      </div>

      {imgPrev&&(
        <div style={{marginBottom:12}}>
          <div style={{position:"relative",display:"inline-block"}}>
            <img src={imgPrev} style={{maxHeight:160,borderRadius:8,border:"2px solid #e0d8cc",display:"block"}} alt="preview"/>
            {scanning&&(
              <div style={{position:"absolute",inset:0,borderRadius:8,background:"rgba(26,18,9,0.55)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
                <div style={{width:"70%",height:2,background:"#e8a000",animation:"scanAnim 1.1s ease-in-out infinite alternate",boxShadow:"0 0 8px #e8a000"}}/>
                <div style={{color:"#fff",fontSize:12,fontWeight:700,background:"rgba(0,0,0,0.5)",padding:"3px 12px",borderRadius:20}}>🔍 AI読み取り中...</div>
              </div>
            )}
            <button onClick={()=>{setImgUrl(null);setImgPrev(null);setOcrDone(false);}}
              style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.6)",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer",fontSize:13,fontWeight:700}}>✕</button>
          </div>
          {ocrDone&&(
            <div style={{marginTop:6,display:"inline-flex",alignItems:"center",gap:6,background:"#e8ffed",border:"1px solid #5c9e6a",color:"#2d6e3a",fontSize:12,fontWeight:600,padding:"4px 10px",borderRadius:8}}>
              ✅ AI読み取り完了 — 内容を確認・編集してください
            </div>
          )}
        </div>
      )}

      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        <select style={{...inSt,marginBottom:0,width:"auto",flex:"0 0 auto"}} value={cat} onChange={e=>setCat(e.target.value)}>
          {CATEGORIES.filter(c=>c!=="すべて").map(c=><option key={c}>{c}</option>)}
        </select>
        <input style={{...inSt,marginBottom:0,flex:1,minWidth:100}} placeholder="店舗名（任意）" value={shop} onChange={e=>setShop(e.target.value)}/>
        <div style={{position:"relative",flex:"0 0 auto"}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#888",fontSize:13,pointerEvents:"none"}}>¥</span>
          <input style={{...inSt,marginBottom:0,paddingLeft:24,width:110}} type="number" placeholder="金額（任意）" value={amount} onChange={e=>setAmount(e.target.value)}/>
        </div>
      </div>

      {postErr&&<div style={{background:"#fff0f0",border:"1px solid #e88",color:"#c00",fontSize:12,padding:"6px 10px",borderRadius:8,marginBottom:10}}>⚠️ {postErr}</div>}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>fileRef.current.click()}
            style={{background:"none",border:"2px solid #e0d8cc",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600,color:"#888"}}>
            📷 画像 <span style={{fontSize:10,color:"#e8a000",fontWeight:700}}>✨AI-OCR</span>
          </button>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleImg(e.target.files[0])}/>
          <span style={{fontSize:12,color:"#bbb",alignSelf:"center"}}>{text.length}/500</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setOpen(false)}
            style={{padding:"8px 16px",border:"2px solid #ddd",borderRadius:8,background:"#fff",cursor:"pointer",fontWeight:600,fontSize:13,color:"#888"}}>
            キャンセル
          </button>
          <button onClick={submit} disabled={posting||!text.trim()}
            style={{padding:"8px 18px",background:text.trim()&&!posting?"#1a1209":"#ccc",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:text.trim()&&!posting?"pointer":"not-allowed",display:"flex",alignItems:"center",gap:8}}>
            {posting?<><Spinner/>投稿中...</>:"投稿する"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── ReplyComposer ─────────────────────────────────────────────────────
function ReplyComposer({handle, onReply, onCancel}){
  const [text,setText]=useState("");
  const [sending,setSending]=useState(false);
  const submit=async()=>{
    if(!text.trim()) return;
    setSending(true);
    await onReply(text.trim());
    setText(""); setSending(false);
  };
  return(
    <div style={{display:"flex",gap:10,marginTop:10,paddingTop:10,borderTop:"1px dashed #e0d8cc",animation:"fadeIn 0.15s ease"}}>
      <span style={{fontSize:20,flexShrink:0}}>{handle.avatar}</span>
      <div style={{flex:1}}>
        <textarea
          style={{width:"100%",minHeight:56,padding:"8px 10px",border:"2px solid #e0d8cc",borderRadius:8,
            fontSize:13,fontFamily:"inherit",resize:"none",background:"#faf8f4",outline:"none"}}
          placeholder={`${handle.name}として返信...`}
          value={text} onChange={e=>setText(e.target.value)} autoFocus maxLength={300}/>
        <div style={{display:"flex",gap:8,marginTop:6,justifyContent:"flex-end"}}>
          <button onClick={onCancel} style={{padding:"5px 12px",border:"2px solid #ddd",borderRadius:6,background:"#fff",cursor:"pointer",fontSize:12,fontWeight:600,color:"#888"}}>キャンセル</button>
          <button onClick={submit} disabled={sending||!text.trim()}
            style={{padding:"5px 14px",background:text.trim()&&!sending?"#1a1209":"#ccc",color:"#fff",border:"none",borderRadius:6,fontWeight:700,fontSize:12,cursor:text.trim()&&!sending?"pointer":"not-allowed",display:"flex",alignItems:"center",gap:6}}>
            {sending?<><Spinner/>送信中...</>:"返信"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── ImageModal ───────────────────────────────────────────────────────
function ImageModal({src, onClose}){
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,cursor:"zoom-out",padding:16}}>
      <img src={src} style={{maxWidth:"100%",maxHeight:"100%",borderRadius:8,boxShadow:"0 8px 40px rgba(0,0,0,0.6)"}} alt="full" onClick={e=>e.stopPropagation()}/>
      <button onClick={onClose} style={{position:"fixed",top:16,right:16,background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"50%",width:40,height:40,cursor:"pointer",fontSize:20,color:"#fff",fontWeight:700}}>✕</button>
    </div>
  );
}

// ── PostCard ──────────────────────────────────────────────────────────
function PostCard({post, handle, liked, onLike, onReply}){
  const [showReplies,setShowReplies]=useState(false);
  const [replying,   setReplying]   =useState(false);
  const [likeAnim,   setLikeAnim]   =useState(false);
  const [imgModal,   setImgModal]   =useState(false);
  const catColor=CAT_COLOR[post.category]||"#888";

  const handleLike=()=>{
    onLike(post.id, post.likes, liked);
    setLikeAnim(true);
    setTimeout(()=>setLikeAnim(false),300);
  };

  const handleReply=async(text)=>{
    await onReply(post.id,{
      id:"r"+Date.now(), handle:handle.name, avatar:handle.avatar, text,
    });
    setReplying(false);
    setShowReplies(true);
  };

  return(
    <div className="post-enter" style={{background:"#fffdf7",border:"2px solid #e0d8cc",borderRadius:14,
      padding:"16px 18px",marginBottom:14,boxShadow:"2px 2px 0 #e0d8cc",transition:"box-shadow 0.15s,transform 0.15s"}}
      onMouseEnter={e=>{e.currentTarget.style.boxShadow="4px 4px 0 #c8b89a";e.currentTarget.style.transform="translateY(-1px)";}}
      onMouseLeave={e=>{e.currentTarget.style.boxShadow="2px 2px 0 #e0d8cc";e.currentTarget.style.transform="translateY(0)";}}>

      <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
        <span style={{fontSize:28,flexShrink:0,lineHeight:1}}>{post.avatar}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,fontSize:14}}>{post.handle}</span>
            <span style={{fontSize:11,color:"#bbb"}}>{timeAgo(post.ts)}</span>
            <span style={{fontSize:11,fontWeight:700,padding:"1px 8px",borderRadius:10,
              background:catColor+"22",color:catColor,border:`1px solid ${catColor}44`}}>
              {post.category}
            </span>
          </div>
          {(post.shop||post.amount)&&(
            <div style={{display:"flex",gap:8,marginTop:3,alignItems:"center",flexWrap:"wrap"}}>
              {post.shop&&<span style={{fontSize:12,color:"#888"}}>📍 {post.shop}</span>}
              {post.amount&&<span style={{fontSize:14,fontWeight:900,color:"#1a1209"}}>¥{post.amount.toLocaleString()}</span>}
            </div>
          )}
        </div>
      </div>

      <p style={{fontSize:14,lineHeight:1.75,color:"#2a2015",marginBottom:post.imageUrl?10:0,whiteSpace:"pre-wrap"}}>{post.text}</p>

      {post.imageUrl&&(
        <div style={{marginBottom:10,borderRadius:10,overflow:"hidden",border:"1px solid #e0d8cc",position:"relative"}}>
          <img src={post.imageUrl} style={{width:"100%",maxHeight:280,objectFit:"cover",display:"block",cursor:"zoom-in"}} alt="レシート画像" onClick={()=>setImgModal(true)}/>
          <button onClick={()=>setImgModal(true)}
            style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,0.55)",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            🔍 全体を見る
          </button>
        </div>
      )}
      {imgModal&&<ImageModal src={post.imageUrl} onClose={()=>setImgModal(false)}/>}

      <div style={{display:"flex",gap:4,alignItems:"center",borderTop:"1px solid #f0e8d8",paddingTop:10,marginTop:10}}>
        <button onClick={handleLike}
          style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",border:"none",
            background:liked?"#fff3e0":"transparent",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:liked?700:500,
            color:liked?"#e8a000":"#888",transition:"all 0.15s"}}>
          <span style={{fontSize:16,display:"inline-block",animation:likeAnim?"pop 0.25s ease":"none"}}>
            {liked?"❤️":"🤍"}
          </span>
          {post.likes}
        </button>
        <button onClick={()=>setReplying(v=>!v)}
          style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",border:"none",
            background:"transparent",borderRadius:20,cursor:"pointer",fontSize:13,color:"#888",fontWeight:500}}>
          💬 {post.replies.length>0?post.replies.length:"返信"}
        </button>
        {post.replies.length>0&&(
          <button onClick={()=>setShowReplies(v=>!v)}
            style={{marginLeft:"auto",padding:"4px 10px",border:"1px solid #e0d8cc",borderRadius:12,
              background:"transparent",cursor:"pointer",fontSize:12,color:"#888",fontWeight:600}}>
            {showReplies?`返信を隠す ▲`:`返信を見る（${post.replies.length}件）▼`}
          </button>
        )}
      </div>

      {showReplies&&post.replies.length>0&&(
        <div style={{marginTop:10,paddingLeft:16,borderLeft:"3px solid #e8d8b8"}}>
          {post.replies.map(r=>(
            <div key={r.id} style={{display:"flex",gap:8,marginBottom:10,animation:"fadeIn 0.15s ease"}}>
              <span style={{fontSize:20,flexShrink:0}}>{r.avatar}</span>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
                  <span style={{fontWeight:700,fontSize:12}}>{r.handle}</span>
                  <span style={{fontSize:11,color:"#bbb"}}>{timeAgo(r.ts)}</span>
                </div>
                <p style={{fontSize:13,lineHeight:1.6,color:"#3a2a18",whiteSpace:"pre-wrap"}}>{r.text}</p>
              </div>
            </div>
          ))}
        </div>
      )}

      {replying&&<ReplyComposer handle={handle} onReply={handleReply} onCancel={()=>setReplying(false)}/>}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────
function App(){
  const [posts,    setPosts]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [loadErr,  setLoadErr]  = useState(null);
  const [likedIds, setLikedIds] = useState(()=>new Set(lsGet(LS_LIKES,[])));
  const [handle,   setHandle]   = useState(()=>lsGet(LS_HANDLE,null));
  const [selCat,   setSelCat]   = useState("すべて");
  const [search,   setSearch]   = useState("");
  const [showSetup,setShowSetup]= useState(false);

  // 初回ロード
  useEffect(()=>{
    fetchPosts()
      .then(p=>{ setPosts(p); setLoading(false); })
      .catch(e=>{ setLoadErr("データの取得に失敗しました"); setLoading(false); });
  },[]);

  useEffect(()=>{ lsSet(LS_LIKES,[...likedIds]); },[likedIds]);

  const activeHandle = handle || {name:"ゲスト",avatar:"👤"};

  const handlePost = (post)=>{ setPosts(prev=>[post,...prev]); };

  const handleLike = async(postId, currentLikes, isLiked)=>{
    const newLikes = isLiked ? currentLikes-1 : currentLikes+1;
    setLikedIds(prev=>{
      const next=new Set(prev);
      isLiked?next.delete(postId):next.add(postId);
      return next;
    });
    setPosts(prev=>prev.map(p=>p.id===postId?{...p,likes:newLikes}:p));
    await updateLikes(postId, newLikes);
  };

  const handleReply = async(postId, reply)=>{
    const saved = await insertReply(reply, postId);
    setPosts(prev=>prev.map(p=>p.id===postId
      ?{...p, replies:[...p.replies, saved]}
      :p
    ));
  };

  const filtered = posts
    .filter(p=>selCat==="すべて"||p.category===selCat)
    .filter(p=>{
      if(!search.trim()) return true;
      const q=search.toLowerCase();
      return p.text.toLowerCase().includes(q)||p.handle.toLowerCase().includes(q)||(p.shop||"").toLowerCase().includes(q);
    });

  const todayPosts=posts.filter(p=>Date.now()-p.ts<86400000).length;

  return(
    <div style={{minHeight:"100vh",background:"#f5f0e8",fontFamily:"'Noto Sans JP',sans-serif"}}>

      <header style={{background:"#1a1209",color:"#fff",padding:"0 24px",position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 8px rgba(0,0,0,0.3)"}}>
        <div style={{maxWidth:680,margin:"0 auto",height:56,display:"flex",alignItems:"center",gap:16}}>
          <div style={{fontFamily:"'Kaisei Decol',serif",fontSize:20,fontWeight:700,letterSpacing:1,flexShrink:0}}>
            🧾 レシート掲示板
          </div>
          <div style={{flex:1}}/>
          <button onClick={()=>setShowSetup(true)}
            style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",
              borderRadius:20,padding:"5px 12px",cursor:"pointer",color:"#fff",fontSize:13,fontWeight:600}}>
            <span>{activeHandle.avatar}</span>
            <span>{activeHandle.name}</span>
            <span style={{fontSize:10,color:"#aaa",marginLeft:2}}>▼</span>
          </button>
        </div>
      </header>

      <div style={{background:"#2d1f0e",color:"#c8a878",padding:"6px 24px",fontSize:12}}>
        <div style={{maxWidth:680,margin:"0 auto",display:"flex",gap:16}}>
          <span>📊 総投稿 {posts.length}件</span>
          <span>🔥 今日 {todayPosts}件</span>
          <span style={{marginLeft:"auto",color:"#7a6040"}}>誰でも無料で投稿・閲覧できます</span>
        </div>
      </div>

      <div style={{maxWidth:680,margin:"0 auto",padding:"20px 16px"}}>

        <PostComposer handle={activeHandle} onPost={handlePost}/>

        <div style={{marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",background:"#fffdf7",border:"2px solid #e0d8cc",
            borderRadius:10,overflow:"hidden",marginBottom:10,boxShadow:"1px 1px 0 #e0d8cc"}}>
            <span style={{padding:"0 12px",fontSize:15,color:"#bbb"}}>🔍</span>
            <input style={{flex:1,padding:"9px 0",border:"none",outline:"none",fontSize:13,background:"transparent",fontFamily:"inherit"}}
              placeholder="キーワードで検索..." value={search} onChange={e=>setSearch(e.target.value)}/>
            {search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",cursor:"pointer",padding:"0 12px",color:"#bbb",fontWeight:700}}>✕</button>}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {CATEGORIES.map(c=>{
              const col=c==="すべて"?"#1a1209":CAT_COLOR[c]||"#888";
              const active=selCat===c;
              return(
                <button key={c} onClick={()=>setSelCat(c)}
                  style={{padding:"4px 12px",borderRadius:20,border:`2px solid ${active?col:"#e0d8cc"}`,
                    background:active?col:"#fffdf7",color:active?"#fff":"#888",
                    cursor:"pointer",fontSize:12,fontWeight:700,transition:"all 0.15s"}}>
                  {c}
                </button>
              );
            })}
          </div>
        </div>

        <div style={{fontSize:12,color:"#aaa",marginBottom:14}}>
          {search
            ?<span>「<strong style={{color:"#666"}}>{search}</strong>」の検索結果: {filtered.length}件</span>
            :<span>{selCat==="すべて"?"全投稿":selCat} · {filtered.length}件</span>}
        </div>

        {loading?(
          <div style={{textAlign:"center",padding:"60px 20px",color:"#bbb"}}>
            <div style={{marginBottom:12,display:"flex",justifyContent:"center"}}><Spinner/></div>
            <div style={{fontSize:13}}>投稿を読み込んでいます...</div>
          </div>
        ):loadErr?(
          <div style={{textAlign:"center",padding:"40px 20px",color:"#c00"}}>
            <div style={{fontSize:32,marginBottom:8}}>⚠️</div>
            <div style={{fontWeight:700,marginBottom:4}}>{loadErr}</div>
            <button onClick={()=>{setLoading(true);fetchPosts().then(p=>{setPosts(p);setLoading(false);}).catch(()=>setLoading(false));}}
              style={{marginTop:8,padding:"8px 20px",background:"#1a1209",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>
              再読み込み
            </button>
          </div>
        ):filtered.length===0?(
          <div style={{textAlign:"center",padding:"60px 20px",color:"#bbb"}}>
            <div style={{fontSize:40,marginBottom:12}}>🔍</div>
            <div style={{fontWeight:700,marginBottom:4,color:"#888"}}>投稿が見つかりません</div>
            <div style={{fontSize:13}}>検索ワードやカテゴリを変えてみてください</div>
          </div>
        ):(
          filtered.map(p=>(
            <PostCard key={p.id} post={p}
              handle={activeHandle}
              liked={likedIds.has(p.id)}
              onLike={handleLike}
              onReply={handleReply}
            />
          ))
        )}
      </div>

      {(showSetup||!handle)&&(
        <HandleSetup onDone={h=>{setHandle(h);setShowSetup(false);}}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
